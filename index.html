<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Finviz</title>
<style>
:root {
  --bg:       #0a0a0a;
  --bg2:      #111111;
  --bg3:      #1a1a1a;
  --bg4:      #222222;
  --border:   #2a2a2a;
  --text:     #e0e0e0;
  --muted:    #666;
  --green:    #30d158;
  --green2:   #1f7a34;
  --red:      #ff453a;
  --red2:     #7f1a1a;
  --blue:     #64d2ff;
  --gold:     #ffd60a;
  --accent:   #32d74b;
  --safe-top: env(safe-area-inset-top, 54px);
  --safe-bot: env(safe-area-inset-bottom, 34px);
  --tab-h:    calc(56px + var(--safe-bot));
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  font-size: 13px;
  height: 100%;
  overscroll-behavior: none;
}

/* ── STATUS BAR SPACER ── */
.status-bar {
  height: var(--safe-top);
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 100;
}

/* ── TOP HEADER ── */
.top-header {
  background: rgba(17,17,17,0.92);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 0.5px solid var(--border);
  padding: 8px 16px;
  position: sticky;
  top: var(--safe-top);
  z-index: 99;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 0.5px;
  font-family: -apple-system, sans-serif;
}
.live-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--muted);
}
.live-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
.live-dot.paused { background: var(--muted); animation: none; }
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.4; transform:scale(.8); }
}
.last-update { font-size: 10px; color: var(--muted); }

/* ── TICKER TAPE ── */
.tape-outer {
  background: var(--bg2);
  border-bottom: 0.5px solid var(--border);
  overflow: hidden;
  height: 32px;
  display: flex;
  align-items: center;
  position: relative;
}
.tape-track {
  display: flex;
  gap: 28px;
  padding: 0 16px;
  animation: scroll-tape 28s linear infinite;
  white-space: nowrap;
}
.tape-outer:hover .tape-track { animation-play-state: paused; }
@keyframes scroll-tape {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.tape-item { display:flex; gap:6px; align-items:center; }
.tape-sym  { font-size:11px; font-weight:600; color:#bbb; }
.tape-val  { font-size:11px; font-weight:700; color:var(--text); }
.tape-chg  { font-size:10px; font-weight:600; }
.tape-chg.up { color:var(--green); }
.tape-chg.dn { color:var(--red); }

/* ── SCROLL CONTAINER ── */
.scroll-body {
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  height: calc(100dvh - var(--safe-top) - 40px - 32px - var(--tab-h));
  padding-bottom: 12px;
}

/* ── SECTION HEADER ── */
.sec-hdr {
  padding: 14px 16px 6px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.sec-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.2px;
}
.sec-link {
  font-size: 12px;
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}

/* ── MARKET PILL ROW ── */
.market-pills {
  display: flex;
  gap: 8px;
  padding: 0 16px 10px;
  overflow-x: auto;
  scrollbar-width: none;
}
.market-pills::-webkit-scrollbar { display:none; }
.mpill {
  background: var(--bg3);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 7px 12px;
  min-width: 80px;
  flex-shrink: 0;
  text-align: center;
}
.mpill-sym  { font-size:10px; color:var(--muted); margin-bottom:2px; }
.mpill-val  { font-size:14px; font-weight:700; }
.mpill-chg  { font-size:11px; font-weight:600; margin-top:1px; }
.mpill-chg.up { color:var(--green); }
.mpill-chg.dn { color:var(--red); }

/* ── HEATMAP ── */
.heatmap-section { padding: 0 10px 10px; }
.heatmap-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.hm-cell {
  aspect-ratio: 1.1;
  border-radius: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform .12s, filter .12s;
  padding: 2px;
}
.hm-cell:active { transform: scale(.94); filter: brightness(1.3); }
.hm-ticker { font-size: 9px; font-weight: 700; color: rgba(255,255,255,.9); line-height:1; }
.hm-chg    { font-size: 8px; color: rgba(255,255,255,.7); margin-top:1px; line-height:1; }
.hm-big .hm-ticker { font-size:11px; }
.hm-big .hm-chg    { font-size:9px; }

/* Color scale */
.c-5  { background: #7f1a1a; }
.c-4  { background: #9e2020; }
.c-3  { background: #c02828; }
.c-2  { background: #d84040; }
.c-1  { background: #a05050; }
.c0   { background: #252525; }
.cp1  { background: #1b5c2c; }
.cp2  { background: #1d7530; }
.cp3  { background: #219438; }
.cp4  { background: #25b344; }
.cp5  { background: #2ed158; }

/* ── SECTORS ── */
.sector-list { padding: 0 16px; display:flex; flex-direction:column; gap:6px; }
.sector-row {
  background: var(--bg3);
  border-radius: 10px;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.sector-name { font-size:12px; color:var(--muted); width:110px; flex-shrink:0; }
.sector-bar-wrap { flex:1; height:5px; background:var(--bg4); border-radius:3px; overflow:hidden; }
.sector-bar      { height:100%; border-radius:3px; transition:width .6s ease; }
.sector-val      { font-size:13px; font-weight:700; width:48px; text-align:right; }
.sector-val.up { color:var(--green); }
.sector-val.dn { color:var(--red); }

/* ── SIGNALS TABLE ── */
.signals-list { padding: 0 16px; display:flex; flex-direction:column; gap:0; }
.sig-row {
  background: var(--bg3);
  border-bottom: 0.5px solid var(--border);
  padding: 9px 12px;
  display: flex;
  align-items: center;
  gap: 0;
}
.sig-row:first-child { border-radius:10px 10px 0 0; }
.sig-row:last-child  { border-radius:0 0 10px 10px; border-bottom:none; }
.sig-ticker { font-size:13px; font-weight:700; color:var(--blue); width:52px; }
.sig-price  { font-size:12px; color:var(--text); flex:1; }
.sig-chg    { font-size:13px; font-weight:700; width:58px; text-align:right; }
.sig-chg.up { color:var(--green); }
.sig-chg.dn { color:var(--red); }
.sig-tag {
  font-size:9px; color:var(--muted);
  background:var(--bg4); border:0.5px solid var(--border);
  padding:2px 5px; border-radius:4px; margin-left:6px;
  white-space:nowrap;
}

/* ── FUTURES / FOREX CARDS ── */
.horiz-cards {
  display:flex; gap:8px;
  padding:0 16px; overflow-x:auto;
  scrollbar-width:none;
}
.horiz-cards::-webkit-scrollbar { display:none; }
.hcard {
  background:var(--bg3);
  border:0.5px solid var(--border);
  border-radius:10px;
  padding:8px 11px;
  min-width:78px; flex-shrink:0;
  text-align:center;
}
.hcard-name  { font-size:9px; color:var(--muted); margin-bottom:3px; }
.hcard-price { font-size:13px; font-weight:700; }
.hcard-chg   { font-size:10px; font-weight:600; margin-top:2px; }
.hcard-chg.up { color:var(--green); }
.hcard-chg.dn { color:var(--red); }

/* ── NEWS ── */
.news-list { padding:0 16px; display:flex; flex-direction:column; gap:0; }
.news-item {
  background:var(--bg3);
  border-bottom:0.5px solid var(--border);
  padding:9px 12px;
  display:flex; gap:9px; align-items:flex-start;
}
.news-item:first-child { border-radius:10px 10px 0 0; }
.news-item:last-child  { border-radius:0 0 10px 10px; border-bottom:none; }
.news-badge {
  background:#1e3a1e; color:var(--green);
  font-size:9px; font-weight:700;
  padding:2px 5px; border-radius:4px;
  white-space:nowrap; min-width:34px; text-align:center;
  flex-shrink:0; margin-top:1px;
}
.news-body {}
.news-headline { font-size:12px; line-height:1.35; color:var(--text); }
.news-meta     { font-size:10px; color:var(--muted); margin-top:3px; }

/* ── CALENDAR ── */
.cal-list { padding:0 16px; display:flex; flex-direction:column; gap:6px; }
.cal-day-card {
  background:var(--bg3);
  border:0.5px solid var(--border);
  border-radius:10px;
  overflow:hidden;
}
.cal-day-hdr {
  background:var(--bg4);
  padding:5px 12px;
  font-size:10px; font-weight:700; color:var(--muted);
  text-transform:uppercase; letter-spacing:.5px;
}
.cal-event {
  padding:6px 12px;
  font-size:11px; color:var(--text);
  display:flex; align-items:center; gap:7px;
  border-top:0.5px solid var(--border);
}
.cal-event:first-of-type { border-top:none; }
.imp-high { color:var(--red); font-size:9px; }
.imp-med  { color:#ff9f0a; font-size:9px; }
.imp-low  { color:var(--muted); font-size:9px; }

/* ── STATS ROW ── */
.stats-row {
  display:flex; gap:0;
  padding:0 16px 10px;
  overflow-x:auto;
  scrollbar-width:none;
}
.stats-row::-webkit-scrollbar { display:none; }
.stat-pill {
  background:var(--bg3);
  border:0.5px solid var(--border);
  border-radius:10px;
  padding:7px 11px;
  margin-right:7px;
  flex-shrink:0;
  white-space:nowrap;
}
.stat-lbl { font-size:9px; color:var(--muted); margin-bottom:2px; }
.stat-val { font-size:13px; font-weight:700; }
.stat-val.up { color:var(--green); }
.stat-val.dn { color:var(--red); }

/* ── TAB BAR ── */
.tab-bar {
  position: fixed;
  bottom: 0; left:0; right:0;
  height: var(--tab-h);
  background: rgba(17,17,17,0.92);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-top: 0.5px solid var(--border);
  display: flex;
  z-index: 200;
  padding-bottom: var(--safe-bot);
}
.tab-item {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:3px; cursor:pointer;
  padding-top:6px;
  transition: opacity .12s;
  -webkit-user-select:none; user-select:none;
}
.tab-item:active { opacity:.5; transform:scale(.93); }
.tab-icon {
  width:26px; height:26px;
  display:flex; align-items:center; justify-content:center;
}
.tab-icon svg {
  width:24px; height:24px;
  fill:var(--muted);
  stroke:var(--muted);
  transition:fill .15s, stroke .15s;
  color:var(--muted);
}
.tab-label {
  font-size:10px; font-weight:500;
  color:var(--muted);
  font-family:-apple-system,sans-serif;
  transition:color .15s;
}
.tab-item.active .tab-icon svg { fill:var(--accent); stroke:var(--accent); color:var(--accent); }
.tab-item.active .tab-label    { color:var(--accent); font-weight:600; }

/* ── SECTION DIVIDER ── */
.section-gap { height: 10px; }

/* ── FLASH ANIMATION for live update ── */
@keyframes flash-green {
  0%   { background: rgba(48,209,88,.25); }
  100% { background: transparent; }
}
@keyframes flash-red {
  0%   { background: rgba(255,69,58,.25); }
  100% { background: transparent; }
}
.flash-up { animation: flash-green .7s ease-out; }
.flash-dn { animation: flash-red .7s ease-out; }

/* ── REFRESH INDICATOR ── */
.refresh-bar {
  height: 2px;
  background: var(--bg2);
  overflow:hidden;
}
.refresh-progress {
  height:100%;
  background: linear-gradient(90deg, var(--accent), transparent);
  width:0%;
  transition: width linear;
}
</style>
</head>

// LIVE DATA STATE (mutated every tick)

let liveHeatmap  = baseHeatmap.map(s=>({...s}));
let liveSectors  = baseSectors.map(s=>({...s}));
let livePills    = basePills.map(s=>({...s}));
let liveFutures  = baseFutures.map(s=>({...s}));
let liveForex    = baseForex.map(s=>({...s}));
let liveGainers  = baseGainers.map(s=>({...s}));
let liveLosers   = baseLosers.map(s=>({...s}));

function jitter(val, maxPct=0.05) {
  return val * (1 + (Math.random() - 0.5) * maxPct);
}
function jitterChg(chg, maxDelta=0.08) {
  return +(chg + (Math.random() - 0.5) * maxDelta).toFixed(2);
}

function tickData() {
  liveHeatmap = liveHeatmap.map(s => ({ t:s.t, c: jitterChg(s.c, 0.12) }));
  liveSectors = liveSectors.map(s => ({ n:s.n, c: jitterChg(s.c, 0.06) }));
  livePills   = livePills.map(s => ({
    sym:s.sym,
    val: +jitter(s.val, 0.004).toFixed(2),
    chg: jitterChg(s.chg, 0.04),
  }));
  liveFutures = liveFutures.map(s => ({
    n:s.n, up: s.c >= 0,
    p: +jitter(s.p, 0.003).toFixed(2),
    c: jitterChg(s.c, 0.04),
  }));
  liveForex = liveForex.map(s => ({
    n:s.n, up: s.c >= 0,
    p: +jitter(s.p, 0.002).toFixed(4),
    c: jitterChg(s.c, 0.03),
  }));
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════

function fmt(n) {
  if (Math.abs(n) >= 1000) return n.toLocaleString('en-US',{maximumFractionDigits:0});
  if (Math.abs(n) < 10)    return n.toFixed(4);
  return n.toFixed(2);
}
function pct(c) { return (c>=0?'+':'')+c.toFixed(2)+'%'; }
function colorClass(c) {
  if (c<=-4) return 'c-5'; if (c<=-3) return 'c-4'; if (c<=-2) return 'c-3';
  if (c<=-1) return 'c-2'; if (c<0)   return 'c-1'; if (c===0) return 'c0';
  if (c<1)   return 'cp1'; if (c<2)   return 'cp2'; if (c<3)   return 'cp3';
  if (c<4)   return 'cp4'; return 'cp5';
}
function now() {
  return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ═══════════════════════════════════════════════════════════
// LIVE UPDATE ENGINE
// ═══════════════════════════════════════════════════════════

const UPDATE_INTERVAL = 4000; // ms between updates
let updateTimer = null;
let progressTimer = null;
let isActive = true;

function updatePills() {
  const pills = document.querySelectorAll('.mpill');
  livePills.forEach((s, i) => {
    if (!pills[i]) return;
    const valEl = pills[i].querySelector('.mpill-val');
    const chgEl = pills[i].querySelector('.mpill-chg');
    const oldChg = parseFloat(chgEl.textContent);
    valEl.textContent = fmt(s.val);
    chgEl.textContent = pct(s.chg);
    chgEl.className = `mpill-chg ${s.chg>=0?'up':'dn'}`;
    // Flash
    pills[i].style.animation = 'none';
    pills[i].offsetHeight; // reflow
    pills[i].style.animation = s.chg > oldChg ? 'flash-green .7s ease-out' : 'flash-red .7s ease-out';
  });
}

function updateHeatmap() {
  liveHeatmap.forEach(s => {
    const cell = document.getElementById(`hm-${s.t}`);
    if (!cell) return;
    const oldClass = cell.className.split(' ').find(c=>c.startsWith('c'));
    const newClass = colorClass(s.c);
    if (oldClass !== newClass) {
      cell.classList.remove(oldClass);
      cell.classList.add(newClass);
    }
    cell.querySelector('.hm-chg').textContent = pct(s.c);
  });
}

function updateSectors() {
  const rows = document.querySelectorAll('.sector-row');
  liveSectors.forEach((s, i) => {
    if (!rows[i]) return;
    const bar = rows[i].querySelector('.sector-bar');
    const val = rows[i].querySelector('.sector-val');
    bar.style.width = Math.min(Math.abs(s.c)/5*100,100)+'%';
    bar.style.background = s.c>=0 ? '#30d158' : '#ff453a';
    val.textContent = pct(s.c);
    val.className = `sector-val ${s.c>=0?'up':'dn'}`;
  });
}

function updateCards(data, id) {
  const cards = document.getElementById(id).querySelectorAll('.hcard');
  data.forEach((d, i) => {
    if (!cards[i]) return;
    cards[i].querySelector('.hcard-price').textContent = fmt(d.p);
    const chgEl = cards[i].querySelector('.hcard-chg');
    chgEl.textContent = pct(d.c);
    chgEl.className = `hcard-chg ${d.c>=0?'up':'dn'}`;
  });
}

function runUpdate() {
  if (!isActive) return;
  tickData();
  updatePills();
  updateHeatmap();
  updateSectors();
  updateCards(liveFutures, 'futures-cards');
  updateCards(liveForex,   'forex-cards');
  document.getElementById('last-update').textContent = 'Updated ' + now();
}

// Progress bar animation
function animateProgress() {
  const bar = document.getElementById('refresh-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  bar.offsetHeight;
  bar.style.transition = `width ${UPDATE_INTERVAL}ms linear`;
  bar.style.width = '100%';
}

function startUpdates() {
  if (updateTimer) return;
  isActive = true;
  document.getElementById('live-dot').classList.remove('paused');
  document.getElementById('live-label').textContent = 'LIVE';
  runUpdate();
  animateProgress();
  updateTimer = setInterval(() => {
    runUpdate();
    animateProgress();
  }, UPDATE_INTERVAL);
}

function stopUpdates() {
  isActive = false;
  clearInterval(updateTimer);
  updateTimer = null;
  document.getElementById('live-dot').classList.add('paused');
  document.getElementById('live-label').textContent = 'PAUSED';
  const bar = document.getElementById('refresh-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
}

// ── Page Visibility API ──────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    startUpdates();
  } else {
    stopUpdates();
  }
});

// ── iOS app state (focus/blur) ───────────────────────────
window.addEventListener('focus', startUpdates);
window.addEventListener('blur',  stopUpdates);
window.addEventListener('pageshow', startUpdates);
window.addEventListener('pagehide', stopUpdates);

// ── Tab bar interaction ──────────────────────────────────
document.querySelectorAll('.tab-item').forEach(tab => {
  tab.addEventListener('click', () => {
    // 1. Marca activo
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    // 2. Scroll a la sección correspondiente
    const targetId = tab.dataset.target;
    const scrollEl = document.getElementById('scroll-body');
    const anchor   = document.getElementById(targetId);

    if (!anchor || !scrollEl) return;

    // offsetTop relativo al scroll-body
    const anchorTop = anchor.getBoundingClientRect().top
                    - scrollEl.getBoundingClientRect().top
                    + scrollEl.scrollTop
                    - 8; // pequeño margen visual

    scrollEl.scrollTo({ top: Math.max(0, anchorTop), behavior: 'smooth' });
  });
});

// ── Start ────────────────────────────────────────────────
startUpdates();
